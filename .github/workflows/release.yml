name: Release

on:
  push:
    branches: [master]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      # Only present on the real repo once RUSTYPASTECHAT_KEYSTORE_BASE64 (and the other
      # RUSTYPASTECHAT_* secrets below) are added under Settings > Secrets and variables >
      # Actions. Without them, the release build falls back to debug signing (see
      # app/build.gradle.kts) — functional for testing, but not a real Play Store artifact.
      - name: Decode release keystore
        if: ${{ secrets.RUSTYPASTECHAT_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.RUSTYPASTECHAT_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.jks"
          echo "RUSTYPASTECHAT_KEYSTORE_PATH=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon
        env:
          RUSTYPASTECHAT_KEYSTORE_PASSWORD: ${{ secrets.RUSTYPASTECHAT_KEYSTORE_PASSWORD }}
          RUSTYPASTECHAT_KEY_ALIAS: ${{ secrets.RUSTYPASTECHAT_KEY_ALIAS }}
          RUSTYPASTECHAT_KEY_PASSWORD: ${{ secrets.RUSTYPASTECHAT_KEY_PASSWORD }}
          RUSTYPASTECHAT_VERSION_CODE: ${{ github.run_number }}

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/release/app-release.apk \
            rustypastechat-v${{ steps.version.outputs.version }}-release.apk

      - name: Publish nightly release
        if: github.ref == 'refs/heads/master'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK="rustypastechat-v${VERSION}-release.apk"

          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true

          git tag -f nightly
          git push origin nightly

          gh release create nightly \
            "$APK" \
            --title "Nightly Build (v${VERSION})" \
            --prerelease \
            --notes "## Nightly Release Build

          **Version:** ${VERSION}
          **Commit:** ${{ github.sha }}
          **Date:** $(date -u +'%Y-%m-%d %H:%M UTC')

          > Automatically published from the latest \`master\` branch."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          APK="rustypastechat-v${VERSION}-release.apk"

          gh release create "$TAG" \
            "$APK" \
            --title "RustyPaste Chat $TAG" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
