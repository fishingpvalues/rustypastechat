name: Release

on:
  push:
    branches: [master]
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
            rustypastechat-v${{ steps.version.outputs.version }}-debug.apk

      - name: Publish nightly release
        if: github.ref == 'refs/heads/master'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APK="rustypastechat-v${VERSION}-debug.apk"

          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/nightly 2>/dev/null || true

          git tag -f nightly
          git push origin nightly

          gh release create nightly \
            "$APK" \
            --title "Nightly Build (v${VERSION})" \
            --prerelease \
            --notes "## Nightly Debug Build

          **Version:** ${VERSION}
          **Commit:** ${{ github.sha }}
          **Date:** $(date -u +'%Y-%m-%d %H:%M UTC')

          > Automatically published from the latest \`master\` branch."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish versioned release
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${{ steps.version.outputs.version }}"
          APK="rustypastechat-v${VERSION}-debug.apk"

          gh release create "$TAG" \
            "$APK" \
            --title "RustyPaste Chat $TAG" \
            --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
