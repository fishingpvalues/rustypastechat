<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A73E8"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Subtle top highlight -->
  <rect x="32" y="32" width="448" height="224" rx="96" fill="url(#glow)"/>

  <!-- Chat bubble shadow -->
  <path d="M112,160 L368,160 C388.8,160 408,179.2 408,200 L408,308 C408,328.8 388.8,348 368,348 L208,348 L140,380 L156,348 L112,348 C91.2,348 72,328.8 72,308 L72,200 C72,179.2 91.2,160 112,160 Z"
        fill="#1A1A1A" opacity="0.08" transform="translate(0,4)"/>

  <!-- Chat bubble body -->
  <path d="M112,156 L368,156 C388.8,156 408,175.2 408,196 L408,304 C408,324.8 388.8,344 368,344 L208,344 L140,376 L156,344 L112,344 C91.2,344 72,324.8 72,304 L72,196 C72,175.2 91.2,156 112,156 Z"
        fill="#FFFFFF"/>

  <!-- Chat text lines -->
  <rect x="128" y="208" width="180" height="12" rx="6" fill="#1A73E8" opacity="0.6"/>
  <rect x="128" y="236" width="120" height="12" rx="6" fill="#1A73E8" opacity="0.35"/>
  <rect x="128" y="264" width="90" height="12" rx="6" fill="#1A73E8" opacity="0.2"/>

  <!-- Clipboard icon -->
  <rect x="288" y="164" width="80" height="104" rx="8" fill="#FFFFFF" stroke="#1A73E8" stroke-width="4"/>
  <path d="M300,152 L356,152 C358.8,152 360,154 360,156 L360,164 L296,164 L296,156 C296,154 297.2,152 300,152 Z" fill="#1A73E8"/>
  <!-- Clipboard lines -->
  <rect x="304" y="184" width="48" height="6" rx="3" fill="#1A73E8" opacity="0.5"/>
  <rect x="304" y="200" width="36" height="6" rx="3" fill="#1A73E8" opacity="0.35"/>
  <rect x="304" y="216" width="42" height="6" rx="3" fill="#1A73E8" opacity="0.2"/>

  <!-- Small floating dots (representing messages/pastes) -->
  <circle cx="400" cy="140" r="12" fill="#34A853" opacity="0.8"/>
  <circle cx="430" cy="180" r="8" fill="#00C8B4" opacity="0.7"/>
  <circle cx="420" cy="360" r="10" fill="#FF6D00" opacity="0.6"/>
</svg>
